# Known-good starting values.yaml for bitnami/mariadb
# Companion to skill: kubernetes-helm-bitnami-databases
#
# Context this was tested against:
#   - chart bitnami/mariadb version 26.1.7
#   - app version 12.3.2
#   - namespace: mariadb
#   - K8s Secrets "mariadb-root-password" and "mariadb-user" pre-created
#   - emptyDir storage (no PVC), single primary, no replication
#
# Required pre-existing K8s secrets (data keys MUST match exactly):
#   secret-root-password.yaml
#     data:
#       mariadb-root-password: <base64-encoded-root-password>
#
#   secret-mariadb-user.yaml
#     data:
#       mariadb-user: <base64>
#       mariadb-password: <base64>

auth:
  # Chart looks up the secret by name (correct), and the data key by the
  # value of `rootPasswordKey`. If you set this to something other than
  # "mariadb-root-password", the chart's secret-template will fail with
  # "does not contain the key" — see skill gotcha #1.
  existingSecret: "mariadb-root-password"
  rootPasswordKey: "mariadb-root-password"

  # Optional: a separate secret providing an application user.
  customPasswordFilesSecret: "mariadb-user"

primary:
  # Custom my.cnf settings — applied via a tmpfs mount, so don't be surprised
  # if you see "not writable" in the init logs (skill gotcha #8). These DO take
  # effect at runtime; it's only direct editing of the file that fails.
  configuration: |
    [mysqld]
    max_allowed_packet = 128M
    # skip-networking = 0  ← USELESS: bitnami's libmariadb.sh passes
    #                       --skip-networking on the command line, which
    #                       overrides my.cnf. See skill gotcha #3.
    # bind-address = 0.0.0.0  ← Same problem. To expose TCP, fix the
    #                          liveness/readiness probe first (gotcha #4).

  # DISABLE probes as a workaround for gotcha #4. Re-enable them with a
  # TCP-based probe once the install is validated and reachable.
  livenessProbe:
    enabled: false
  readinessProbe:
    enabled: false

  persistence:
    enabled: false  # emptyDir — data is lost on pod restart. Fine for labs.
