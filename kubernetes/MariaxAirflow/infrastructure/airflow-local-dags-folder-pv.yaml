apiVersion: v1
kind: PersistentVolume
metadata:
  name: airflow-local-dags-folder
spec:
  storageClassName: local-path
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  claimRef:
     namespace: airflow
     name: airflow-local-dags-folder
  hostPath:
    path: "/home/ubuntu/kubernetes/MariaxAirflow/airflow/dags"